<!DOCTYPE html>
<html lang="zh" data-ha-style="teaching">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>单词本 · Study — 交互背单词</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0f766e; --primary-container:#115e59; --on-primary:#fff;
  --secondary-container:#f59e0b; --accent-glow:#0f766e;
  --bg:#f6fbfb; --surface:#f6fbfb;
  --surface-container-lowest:#ffffff; --surface-container-low:#edf7f5;
  --surface-container:#e6f2ef; --surface-container-high:#dcebe7;
  --fg-1:#10201f; --fg-2:#304c49; --fg-muted:#647b78;
  --border:rgba(15,118,110,.12); --border-strong:rgba(15,118,110,.24);
  --green:#10b981; --blue:#3b82f6; --yellow:#f59e0b; --red:#ef4444;
  --font-headline:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
  --font-body:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
  --font-mono:'SF Mono','Menlo',ui-monospace,monospace;
  --space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:20px;
  --space-2xl:24px;--space-3xl:32px;--space-4xl:48px;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:28px;--radius-pill:9999px;
  --shadow-sm:0 1px 2px rgba(16,32,31,.05);
  --shadow-md:0 4px 14px rgba(16,32,31,.09);
  --shadow-lg:0 14px 38px rgba(16,32,31,.16);
  --gradient-text:linear-gradient(115deg,#0f766e 0%,#f59e0b 100%);
  --gradient-hero:linear-gradient(135deg,#0f766e 0%,#115e59 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
body{min-height:100vh;line-height:1.55;
  background-image:
    radial-gradient(circle at 12% 8%,rgba(15,118,110,.07),transparent 42%),
    radial-gradient(circle at 88% 92%,rgba(245,158,11,.07),transparent 45%);
  background-attachment:fixed}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--radius-sm)}

.lesson-shell{max-width:1080px;margin:0 auto;padding:var(--space-2xl) var(--space-xl) var(--space-4xl);
  display:flex;flex-direction:column;gap:var(--space-xl)}

/* header */
.lesson-header{display:flex;flex-direction:column;gap:var(--space-sm)}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--primary)}
.lesson-header h1{font-family:var(--font-headline);font-size:clamp(28px,5vw,42px);font-weight:700;
  letter-spacing:-.02em;line-height:1.1}
.lesson-header h1 .grad{background:var(--gradient-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.objective{color:var(--fg-2);font-size:15px;max-width:62ch}

/* control bar */
.try-control{display:flex;flex-wrap:wrap;gap:var(--space-md);align-items:center;
  background:var(--surface-container-lowest);border:1px solid var(--border);
  border-radius:var(--radius-xl);padding:var(--space-md);box-shadow:var(--shadow-sm)}
.seg{display:flex;background:var(--surface-container-low);border-radius:var(--radius-pill);padding:4px;gap:2px}
.seg button{padding:8px 16px;border-radius:var(--radius-pill);font-size:13.5px;font-weight:600;
  color:var(--fg-muted);transition:.18s;white-space:nowrap}
.seg button[aria-pressed="true"]{background:var(--surface-container-lowest);color:var(--primary);box-shadow:var(--shadow-sm)}
.search{flex:1;min-width:160px;display:flex;align-items:center;gap:var(--space-sm);
  background:var(--surface-container-low);border:1px solid var(--border);
  border-radius:var(--radius-pill);padding:8px 14px}
.search input{flex:1;border:none;background:none;font-size:14px;color:var(--fg-1);outline:none}
.search svg{flex:none;color:var(--fg-muted)}
.count-pill{font-size:12.5px;font-weight:600;color:var(--fg-muted);font-family:var(--font-mono);white-space:nowrap}

/* filter rail */
.step-rail{display:flex;flex-direction:column;gap:var(--space-sm)}
.chip-row{display:flex;flex-wrap:wrap;gap:var(--space-sm);align-items:center}
.chip-label{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--fg-muted);margin-right:2px;width:48px;flex:none}
.chip{padding:5px 12px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;
  background:var(--surface-container-lowest);border:1px solid var(--border);color:var(--fg-2);transition:.16s}
.chip:hover{border-color:var(--border-strong)}
.chip[aria-pressed="true"]{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}
.chip.lt{font-family:var(--font-mono);min-width:34px;text-align:center}

/* stage */
.lesson-stage{min-height:420px}

/* flashcard */
.fc-wrap{display:flex;flex-direction:column;align-items:center;gap:var(--space-lg)}
.flashcard{width:100%;max-width:640px;height:clamp(400px,66vh,540px);
  perspective:1800px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,.1,.2,1)}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--radius-2xl);border:1px solid var(--border);
  background:var(--surface-container-lowest);box-shadow:var(--shadow-lg);overflow:hidden}
.fc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:var(--space-3xl);gap:var(--space-lg)}
.fc-front::before{content:"";position:absolute;inset:0;background:
  radial-gradient(circle at 50% 0%,rgba(15,118,110,.08),transparent 60%);pointer-events:none}
.fc-badges{display:flex;gap:var(--space-sm);flex-wrap:wrap;justify-content:center}
.badge{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:var(--radius-pill);letter-spacing:.02em}
.badge.pos{background:var(--surface-container);color:var(--fg-2)}
.badge.thm{color:#fff}
.badge.thm.tech{background:#0f766e}.badge.thm.action{background:#3b82f6}
.badge.thm.emotion{background:#c94c00}.badge.thm.other{background:#7b40e0}
.fc-word{font-family:var(--font-headline);font-weight:700;letter-spacing:-.02em;
  font-size:clamp(34px,7vw,56px);line-height:1.05;
  background:var(--gradient-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.fc-hint{font-size:13px;color:var(--fg-muted);display:flex;align-items:center;gap:6px}
.fc-known-flag{position:absolute;top:16px;right:18px;font-size:12px;font-weight:700;
  color:var(--green);display:flex;align-items:center;gap:4px}
.fc-back{transform:rotateY(180deg);display:flex;flex-direction:column;padding:0}
.fc-back-scroll{overflow-y:auto;padding:var(--space-2xl);display:flex;flex-direction:column;gap:var(--space-lg)}
.fc-back-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:var(--space-md)}
.fc-back-word{font-family:var(--font-headline);font-size:26px;font-weight:700;color:var(--fg-1)}
.fc-phon{font-family:var(--font-mono);font-size:15px;color:var(--primary)}
.fc-zh{font-size:21px;font-weight:600;color:var(--fg-1);line-height:1.4}
.fc-en{font-size:14px;color:var(--fg-2);font-style:italic;
  padding-left:var(--space-md);border-left:3px solid var(--secondary-container)}
.block-title{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--primary);margin-bottom:var(--space-xs)}
.ex-list{display:flex;flex-direction:column;gap:6px}
.ex-list li{list-style:none;font-size:14px;color:var(--fg-2);padding:8px 12px;
  background:var(--surface-container-low);border-radius:var(--radius-sm);line-height:1.5}
.concept-drawer{display:flex;flex-direction:column;gap:var(--space-sm)}
.note{display:flex;gap:var(--space-md);font-size:13.5px;line-height:1.55}
.note .nl{flex:none;width:84px;font-weight:700;color:var(--primary);font-size:12px}
.note .nt{color:var(--fg-2)}
.note code,.ex-list code{font-family:var(--font-mono);font-size:.88em;
  background:var(--surface-container);padding:1px 5px;border-radius:5px}

/* card controls */
.fc-controls{display:flex;align-items:center;gap:var(--space-sm);flex-wrap:wrap;justify-content:center}
.ctrl-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-pill);
  font-size:13.5px;font-weight:600;background:var(--surface-container-lowest);
  border:1px solid var(--border);color:var(--fg-2);transition:.16s}
.ctrl-btn:hover{border-color:var(--primary);color:var(--primary)}
.ctrl-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.ctrl-btn.primary:hover{background:var(--primary-container);color:#fff}
.ctrl-btn.known[data-on="true"]{background:var(--green);color:#fff;border-color:var(--green)}
.fc-progress{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--fg-muted);
  min-width:62px;text-align:center}

/* list mode */
.list-tools{display:flex;justify-content:flex-end;margin-bottom:var(--space-md)}
.toggle{display:flex;align-items:center;gap:var(--space-sm);font-size:13px;font-weight:600;color:var(--fg-2)}
.switch{width:42px;height:24px;border-radius:var(--radius-pill);background:var(--surface-container-high);
  position:relative;transition:.2s;flex:none}
.switch[aria-pressed="true"]{background:var(--primary)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:.2s;box-shadow:var(--shadow-sm)}
.switch[aria-pressed="true"]::after{transform:translateX(18px)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:var(--space-md)}
.mini{text-align:left;background:var(--surface-container-lowest);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-lg);display:flex;flex-direction:column;gap:6px;
  transition:.16s;position:relative}
.mini:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border-strong)}
.mini .mw{font-family:var(--font-headline);font-size:18px;font-weight:700;color:var(--fg-1)}
.mini .mp{font-family:var(--font-mono);font-size:12px;color:var(--primary)}
.mini .mz{font-size:13.5px;color:var(--fg-2);transition:filter .18s}
.mini.hide .mz{filter:blur(6px)}
.mini.hide:hover .mz,.mini.hide:focus-within .mz{filter:none}
.mini .mtop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mini .mknown{font-size:11px;color:var(--green);font-weight:700;flex:none}
.mini .mthm{width:8px;height:8px;border-radius:50%;flex:none;margin-top:6px}
.mthm.tech{background:#0f766e}.mthm.action{background:#3b82f6}
.mthm.emotion{background:#c94c00}.mthm.other{background:#7b40e0}

/* quiz */
.check-yourself{max-width:560px;margin:0 auto;background:var(--surface-container-lowest);
  border:1px solid var(--border);border-radius:var(--radius-2xl);padding:var(--space-3xl);
  box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:var(--space-lg);text-align:center}
.quiz-meta{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;
  color:var(--fg-muted);font-family:var(--font-mono)}
.quiz-bar{height:6px;border-radius:var(--radius-pill);background:var(--surface-container-high);overflow:hidden}
.quiz-bar i{display:block;height:100%;background:var(--gradient-hero);transition:width .3s}
.quiz-prompt{font-size:13px;color:var(--fg-muted);font-weight:600}
.quiz-word{font-family:var(--font-headline);font-size:clamp(30px,6vw,46px);font-weight:700;
  background:var(--gradient-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.quiz-answer{display:flex;flex-direction:column;gap:var(--space-sm);padding:var(--space-lg);
  background:var(--surface-container-low);border-radius:var(--radius-lg)}
.quiz-answer .qa-zh{font-size:20px;font-weight:600}
.quiz-answer .qa-phon{font-family:var(--font-mono);color:var(--primary);font-size:14px}
.quiz-answer .qa-ex{font-size:13.5px;color:var(--fg-2);font-style:italic}
.quiz-btns{display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap}
.big-btn{padding:13px 26px;border-radius:var(--radius-pill);font-size:14.5px;font-weight:700;transition:.16s}
.big-btn.reveal{background:var(--primary);color:#fff;width:100%}
.big-btn.reveal:hover{background:var(--primary-container)}
.big-btn.yes{background:var(--green);color:#fff}
.big-btn.no{background:var(--surface-container);color:var(--fg-2)}
.big-btn.yes:hover{filter:brightness(1.08)}.big-btn.no:hover{background:var(--surface-container-high)}
.quiz-score{font-family:var(--font-headline);font-size:52px;font-weight:700;color:var(--primary)}

/* recap */
.recap-strip{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-lg);
  background:var(--surface-container-low);border:1px solid var(--border);
  border-radius:var(--radius-xl);padding:var(--space-lg) var(--space-xl)}
.recap-strip .rt{font-size:13px;font-weight:700;color:var(--fg-2)}
.prog-track{flex:1;min-width:140px;height:10px;border-radius:var(--radius-pill);
  background:var(--surface-container-high);overflow:hidden}
.prog-track i{display:block;height:100%;background:var(--gradient-hero);transition:width .4s}
.prog-num{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--primary)}
.link-btn{font-size:12.5px;font-weight:600;color:var(--fg-muted);text-decoration:underline;text-underline-offset:3px}
.link-btn:hover{color:var(--primary)}

.empty{text-align:center;padding:var(--space-4xl) var(--space-xl);color:var(--fg-muted);font-size:15px}

.foot{text-align:center;font-size:12px;color:var(--fg-muted);margin-top:var(--space-md)}

@media(max-width:640px){
  .lesson-shell{padding:var(--space-lg) var(--space-md) var(--space-3xl)}
  .chip-label{width:100%;margin-bottom:2px}
  .note .nl{width:70px}
  .seg{width:100%}.seg button{flex:1}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
@media(prefers-reduced-motion:reduce){
  .fc-inner{transition:none}.mini:hover{transform:none}
}
</style>
</head>
<body>
<div class="lesson-shell">

  <header class="lesson-header">
    <span class="eyebrow">单词本 · 交互复习</span>
    <h1>把生词变成<span class="grad">可翻看的卡片</span></h1>
    <p class="objective">这里是你贴过的所有英语生词。翻卡片记忆、开自测检验、按字母或主题筛选——每天打开复习几分钟，把"见过"变成"记住"。</p>
  </header>

  <div class="try-control">
    <div class="seg" role="group" aria-label="学习模式">
      <button data-mode="card" aria-pressed="true">🃏 卡片</button>
      <button data-mode="list" aria-pressed="false">📋 列表</button>
      <button data-mode="quiz" aria-pressed="false">🎯 自测</button>
    </div>
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search" placeholder="搜索单词 / 释义…" aria-label="搜索单词">
    </label>
    <span class="count-pill" id="countPill">18 / 18</span>
  </div>

  <div class="step-rail">
    <div class="chip-row" id="themeRow">
      <span class="chip-label">主题</span>
    </div>
    <div class="chip-row" id="letterRow">
      <span class="chip-label">字母</span>
    </div>
  </div>

  <main class="lesson-stage" id="stage" aria-live="polite"></main>

  <div class="recap-strip">
    <span class="rt">已掌握进度</span>
    <span class="prog-track"><i id="progFill"></i></span>
    <span class="prog-num" id="progNum">0 / 18</span>
    <button class="link-btn" id="resetBtn">重置进度</button>
  </div>

  <p class="foot">数据来自 vocabulary.md · 进度保存在本机浏览器 · 每周六 19:07 会有 Bark 复习提醒</p>
</div>

<script>
const WORDS=[

const THEMES={tech:"AI · 科技",action:"动作 · 流程",emotion:"情绪 · 评价",other:"构词 · 其他"};

const LS_KEY="studywords_known_v1";
const state={
  mode:"card",theme:"all",letter:"all",q:"",
  idx:0,listHide:false,
  known:new Set(JSON.parse(localStorage.getItem(LS_KEY)||"[]")),
  view:[],quiz:null
};
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmt=s=>esc(s).replace(/`([^`]+)`/g,"<code>$1</code>");
function saveKnown(){localStorage.setItem(LS_KEY,JSON.stringify([...state.known]))}

function filtered(){
  const q=state.q.trim().toLowerCase();
  return WORDS.filter(w=>{
    if(state.theme!=="all"&&w.theme!==state.theme)return false;
    if(state.letter!=="all"&&w.letter!==state.letter)return false;
    if(q){
      if(!(w.w.toLowerCase().includes(q)||w.zh.toLowerCase().includes(q)||w.en.toLowerCase().includes(q)))return false;
    }
    return true;
  });
}
function rebuildView(){
  state.view=filtered();
  if(state.idx>=state.view.length)state.idx=0;
}

/* ---- filter chips ---- */
function buildChips(){
  const tr=$("#themeRow"),lr=$("#letterRow");
  tr.querySelectorAll(".chip").forEach(c=>c.remove());
  lr.querySelectorAll(".chip").forEach(c=>c.remove());
  const mk=(txt,val,kind)=>{
    const b=document.createElement("button");
    b.className="chip"+(kind==="lt"?" lt":"");
    b.textContent=txt;b.dataset.val=val;b.dataset.kind=kind;
    b.setAttribute("aria-pressed",(kind==="theme"?state.theme:state.letter)===val);
    b.onclick=()=>{
      if(kind==="theme")state.theme=val;else state.letter=val;
      state.idx=0;state.quiz=null;refresh();
    };
    return b;
  };
  tr.appendChild(mk("全部","all","theme"));
  Object.keys(THEMES).forEach(k=>tr.appendChild(mk(THEMES[k],k,"theme")));
  const letters=[...new Set(WORDS.map(w=>w.letter))].sort();
  lr.appendChild(mk("全部","all","lt"));
  letters.forEach(L=>lr.appendChild(mk(L,L,"lt")));
}
function syncChips(){
  document.querySelectorAll("#themeRow .chip").forEach(c=>
    c.setAttribute("aria-pressed",state.theme===c.dataset.val));
  document.querySelectorAll("#letterRow .chip").forEach(c=>
    c.setAttribute("aria-pressed",state.letter===c.dataset.val));
}

/* ---- shared bits ---- */
function noteHTML(n){
  return `<div class="note"><span class="nl">${esc(n.l)}</span><span class="nt">${fmt(n.t)}</span></div>`;
}
function backHTML(w){
  return `<div class="fc-back-scroll">
    <div class="fc-back-head">
      <span class="fc-back-word">${esc(w.w)}</span>
      <span class="fc-phon">${esc(w.p)}</span>
      <span class="badge pos">${esc(w.pos)}</span>
    </div>
    <div class="fc-zh">${esc(w.zh)}</div>
    <div class="fc-en">${esc(w.en)}</div>
    <div>
      <div class="block-title">例句 Examples</div>
      <ul class="ex-list">${w.ex.map(e=>`<li>${fmt(e)}</li>`).join("")}</ul>
    </div>
    <div>
      <div class="block-title">详解 Breakdown</div>
      <div class="concept-drawer">${w.notes.map(noteHTML).join("")}</div>
    </div>
  </div>`;
}

/* ---- CARD MODE ---- */
function renderCard(){
  const stage=$("#stage");
  if(!state.view.length){stage.innerHTML=`<div class="empty">没有匹配的单词，换个筛选试试。</div>`;return;}
  const w=state.view[state.idx];
  const known=state.known.has(w.w);
  stage.innerHTML=`
   <div class="fc-wrap">
     <div class="flashcard" id="flashcard" tabindex="0" role="button"
          aria-label="单词卡片：${esc(w.w)}，点击或按空格翻转查看释义">
       <div class="fc-inner">
         <div class="fc-face fc-front">
           ${known?'<span class="fc-known-flag">✓ 已掌握</span>':''}
           <div class="fc-badges">
             <span class="badge thm ${w.theme}">${esc(THEMES[w.theme])}</span>
             <span class="badge pos">${esc(w.pos)}</span>
           </div>
           <div class="fc-word">${esc(w.w)}</div>
           <div class="fc-hint">点击翻转，回忆它的意思 ▸</div>
         </div>
         <div class="fc-face fc-back">${backHTML(w)}</div>
       </div>
     </div>
     <div class="fc-controls">
       <button class="ctrl-btn" id="prevBtn" aria-label="上一个">◀ 上一个</button>
       <span class="fc-progress">${state.idx+1} / ${state.view.length}</span>
       <button class="ctrl-btn" id="nextBtn" aria-label="下一个">下一个 ▶</button>
       <button class="ctrl-btn" id="flipBtn">🔄 翻转</button>
       <button class="ctrl-btn" id="shuffleBtn">🔀 打乱</button>
       <button class="ctrl-btn known primary" id="knownBtn" data-on="${known}">
         ${known?"✓ 已掌握":"标记已掌握"}</button>
     </div>
   </div>`;
  const fc=$("#flashcard");
  const flip=()=>fc.classList.toggle("flipped");
  fc.onclick=flip;
  fc.onkeydown=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}};
  $("#flipBtn").onclick=e=>{e.stopPropagation();flip();};
  $("#prevBtn").onclick=()=>{state.idx=(state.idx-1+state.view.length)%state.view.length;renderCard();};
  $("#nextBtn").onclick=()=>{state.idx=(state.idx+1)%state.view.length;renderCard();};
  $("#shuffleBtn").onclick=()=>{
    for(let i=state.view.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[state.view[i],state.view[j]]=[state.view[j],state.view[i]];}
    state.idx=0;renderCard();
  };
  $("#knownBtn").onclick=()=>{
    if(state.known.has(w.w))state.known.delete(w.w);else state.known.add(w.w);
    saveKnown();renderCard();updateProgress();
  };
}

/* ---- LIST MODE ---- */
function renderList(){
  const stage=$("#stage");
  const tools=`<div class="list-tools">
     <button class="toggle" id="hideToggle">
       隐藏释义自测<span class="switch" role="switch" aria-pressed="${state.listHide}" aria-label="隐藏释义"></span>
     </button></div>`;
  if(!state.view.length){
    stage.innerHTML=tools+`<div class="empty">没有匹配的单词，换个筛选试试。</div>`;
    $("#hideToggle").onclick=()=>{state.listHide=!state.listHide;renderList();};
    return;
  }
  const cards=state.view.map((w,i)=>`
    <button class="mini ${state.listHide?'hide':''}" data-i="${i}"
            aria-label="查看 ${esc(w.w)} 的卡片">
      <div class="mtop">
        <span class="mw">${esc(w.w)}</span>
        <span class="mthm ${w.theme}" title="${esc(THEMES[w.theme])}"></span>
      </div>
      <span class="mp">${esc(w.p)}</span>
      <span class="mz">${esc(w.pos)} ${esc(w.zh)}</span>
      ${state.known.has(w.w)?'<span class="mknown">✓ 已掌握</span>':''}
    </button>`).join("");
  stage.innerHTML=tools+`<div class="grid">${cards}</div>`;
  $("#hideToggle").onclick=()=>{state.listHide=!state.listHide;renderList();};
  stage.querySelectorAll(".mini").forEach(el=>{
    el.onclick=()=>{state.idx=+el.dataset.i;setMode("card");};
  });
}

/* ---- QUIZ MODE ---- */
function startQuiz(){
  const pool=filtered().slice();
  for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  state.quiz={pool,i:0,revealed:false,correct:0,wrong:0,done:false};
}
function renderQuiz(){
  const stage=$("#stage");
  if(!state.quiz)startQuiz();
  const Q=state.quiz;
  if(!Q.pool.length){
    stage.innerHTML=`<div class="check-yourself"><div class="empty">没有匹配的单词，换个筛选再开始自测。</div></div>`;
    return;
  }
  if(Q.done){
    const total=Q.pool.length,rate=Math.round(Q.correct/total*100);
    stage.innerHTML=`<div class="check-yourself">
       <div class="quiz-prompt">自测完成</div>
       <div class="quiz-score">${Q.correct} / ${total}</div>
       <div class="rt">正确率 ${rate}%　·　不熟 ${Q.wrong} 个</div>
       <div class="quiz-btns">
         <button class="big-btn yes" id="againBtn">🔁 再测一轮</button>
         <button class="big-btn no" id="toCardBtn">去翻卡片</button>
       </div></div>`;
    $("#againBtn").onclick=()=>{startQuiz();renderQuiz();};
    $("#toCardBtn").onclick=()=>setMode("card");
    return;
  }
  const w=Q.pool[Q.i],total=Q.pool.length;
  stage.innerHTML=`<div class="check-yourself">
     <div class="quiz-meta"><span>第 ${Q.i+1} / ${total} 题</span><span>✓ ${Q.correct}　✗ ${Q.wrong}</span></div>
     <div class="quiz-bar"><i style="width:${Q.i/total*100}%"></i></div>
     <div class="quiz-prompt">还记得这个词的意思吗？</div>
     <div class="quiz-word">${esc(w.w)}</div>
     ${Q.revealed?`
       <div class="quiz-answer">
         <span class="qa-phon">${esc(w.p)} ${esc(w.pos)}</span>
         <span class="qa-zh">${esc(w.zh)}</span>
         <span class="qa-ex">${fmt(w.ex[0])}</span>
       </div>
       <div class="quiz-prompt">刚才答对了吗？</div>
       <div class="quiz-btns">
         <button class="big-btn yes" id="qYes">✓ 记得</button>
         <button class="big-btn no" id="qNo">✗ 不熟</button>
       </div>`:`
       <button class="big-btn reveal" id="revealBtn">显示答案</button>`}
   </div>`;
  if(Q.revealed){
    $("#qYes").onclick=()=>{Q.correct++;state.known.add(w.w);saveKnown();nextQuiz();};
    $("#qNo").onclick=()=>{Q.wrong++;state.known.delete(w.w);saveKnown();nextQuiz();};
  }else{
    $("#revealBtn").onclick=()=>{Q.revealed=true;renderQuiz();};
  }
}
function nextQuiz(){
  const Q=state.quiz;Q.i++;Q.revealed=false;
  if(Q.i>=Q.pool.length)Q.done=true;
  renderQuiz();updateProgress();
}

/* ---- mode / refresh ---- */
function setMode(m){
  state.mode=m;
  document.querySelectorAll(".seg button").forEach(b=>
    b.setAttribute("aria-pressed",b.dataset.mode===m));
  if(m==="quiz")state.quiz=null;
  refresh();
}
function renderStage(){
  if(state.mode==="card")renderCard();
  else if(state.mode==="list")renderList();
  else renderQuiz();
}
function updateProgress(){
  const n=state.known.size,t=WORDS.length;
  $("#progFill").style.width=(n/t*100)+"%";
  $("#progNum").textContent=`${n} / ${t}`;
}
function refresh(){
  rebuildView();
  $("#countPill").textContent=`${state.view.length} / ${WORDS.length}`;
  syncChips();
  renderStage();
  updateProgress();
}

/* ---- init ---- */
document.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
$("#search").addEventListener("input",e=>{state.q=e.target.value;state.idx=0;state.quiz=null;refresh();});
$("#resetBtn").onclick=()=>{
  if(confirm("确定清空所有“已掌握”标记吗？")){
    state.known.clear();saveKnown();refresh();
  }
};
document.addEventListener("keydown",e=>{
  if(state.mode!=="card")return;
  if(e.target.tagName==="INPUT")return;
  if(e.key==="ArrowLeft"){$("#prevBtn")&&$("#prevBtn").click();}
  else if(e.key==="ArrowRight"){$("#nextBtn")&&$("#nextBtn").click();}
});
buildChips();
refresh();
</script>
</body>
</html>
